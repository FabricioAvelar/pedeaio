{% extends 'base.html' %}
{% load static %}

{% block titulo %}
Login
{% endblock %}

{% block estilo %}
<link rel="stylesheet" href="{% static 'style/login.css' %}" />
{% endblock %}

{% block scripts %}
{% endblock %}
  {% block conteudo %}
<div class="login-container">

    <div class="login-box">
        <h3>Já sou cliente</h3>

        <label>E-mail, CPF ou CNPJ</label>
        <input type="text" id="usuario">

        <label>Senha</label>
        <input type="password" id="senha">

        <p id="erro"></p>

        <button class="btn-primary" id="entrar">Acessar conta</button>
        <button class="btn-outline full">Esqueci minha senha</button>
    </div>

    <div class="divider"></div>

    <div class="login-box">
        <h3>Criar conta</h3>

        <label>Informe seu e-mail</label>
        <input type="email">

        <button class="btn-primary">Prosseguir</button>
    </div>
</div>
<script src="static/script/login.js"></script>
{% endblock %}
